name: CI / CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Type check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Tests
        run: npm test -- --no-coverage

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.release.outputs.new_release_version }}
      released: ${{ steps.release.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  deploy:
    name: Deploy to Play Store & GitHub Release
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (GitHub Release)
        id: apk
        run: |
          OUTPUT=$(eas build --platform android --profile preview --non-interactive --json 2>/dev/null || echo "[]")
          APK_URL=$(echo "$OUTPUT" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          builds = data if isinstance(data, list) else [data]
          url = builds[0].get('artifacts', {}).get('buildUrl', '') if builds else ''
          print(url)
          " 2>/dev/null || echo "")
          echo "url=$APK_URL" >> $GITHUB_OUTPUT

      - name: Download APK
        if: steps.apk.outputs.url != ''
        run: |
          curl -L "${{ steps.apk.outputs.url }}" \
            -o "spmove-v${{ needs.release.outputs.version }}.apk"

      - name: Attach APK to GitHub Release
        if: steps.apk.outputs.url != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: spmove-v${{ needs.release.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build AAB (Play Store)
        id: aab
        continue-on-error: true
        run: eas build --platform android --profile production --non-interactive

      - name: Submit to Play Store (internal)
        if: steps.aab.outcome == 'success'
        continue-on-error: true
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}' > /tmp/google-service-account.json
          eas submit --platform android --profile production --non-interactive \
            --android-service-account-key-path /tmp/google-service-account.json \
            --track internal
